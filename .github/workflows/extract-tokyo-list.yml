name: Extract Tokyo Coffee List

on:
  workflow_dispatch:
  push:
    paths:
      - scripts/extract_map_coordinates.js
      - .github/workflows/extract-tokyo-list.yml

permissions:
  contents: write

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install playwright@1.54.1
      - run: npx playwright install --with