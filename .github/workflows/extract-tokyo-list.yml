name: Extract Tokyo Coffee List

on:
  workflow_dispatch:
  push:
    paths:
      - scripts/geocode_tokyo_places.py
      - .github/workflows/extract-tokyo-list.yml

permissions:
  contents: write

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python scripts/geocode_tokyo_places.py
      - name: Save geocoded list
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add tmp/tokyo-coffee-list.json
          git commit -m 'Geocode Tokyo coffee places' || exit 0
          git push
