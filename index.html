<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no" />
  <meta name="theme-color" content="#f4f1ea" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Hong Kong" />
  <title>Hong Kong · Coffee Shops</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icons/icon-192.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="icons/icon-180.png" />
  <link rel="stylesheet" href="./fonts.css?v=17" />
  <link rel="preconnect" href="https://tiles.openfreemap.org" />
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@5.12.0/dist/maplibre-gl.css" />
  <link rel="stylesheet" href="./styles.css?v=17" />
  <link rel="stylesheet" href="./admin.css?v=17" />
</head>
<body>
  <svg class="icon-sprite" aria-hidden="true">
    <symbol id="ms-add" viewBox="0 0 960 960"><path d="M440 520H200v-80h240V200h80v240h240v80H520v240h-80V520Z"/></symbol>
    <symbol id="ms-arrow-forward" viewBox="0 0 960 960"><path d="M647 520H160v-80h487L423 216l57-56 320 320-320 320-57-56 224-224Z"/></symbol>
    <symbol id="ms-bookmark" viewBox="0 0 960 960"><path d="M200 840V200q0-33 23.5-56.5T280 120h400q33 0 56.5 23.5T760 200v640L480 720 200 840Zm80-122 200-86 200 86V200H280v518Z"/></symbol>
    <symbol id="ms-bookmark-filled" viewBox="0 0 960 960"><path d="M200 840V200q0-33 23.5-56.5T280 120h400q33 0 56.5 23.5T760 200v640L480 720 200 840Z"/></symbol>
    <symbol id="ms-check" viewBox="0 0 960 960"><path d="M382 720 154 492l57-57 171 171 367-367 57 57-424 424Z"/></symbol>
    <symbol id="ms-close" viewBox="0 0 960 960"><path d="m256 760-56-56 224-224-224-224 56-56 224 224 224-224 56 56-224 224 224 224-56 56-224-224-224 224Z"/></symbol>
    <symbol id="ms-expand-more" viewBox="0 0 960 960"><path d="M480 615 240 375l56-56 184 184 184-184 56 56-240 240Z"/></symbol>
    <symbol id="ms-format-list-bulleted" viewBox="0 0 960 960"><path d="M360 760v-80h480v80H360Zm0-240v-80h480v80H360Zm0-240v-80h480v80H360ZM200 800q-33 0-56.5-23.5T120 720q0-33 23.5-56.5T200 640q33 0 56.5 23.5T280 720q0 33-23.5 56.5T200 800Zm0-240q-33 0-56.5-23.5T120 480q0-33 23.5-56.5T200 400q33 0 56.5 23.5T280 480q0 33-23.5 56.5T200 560Zm0-240q-33 0-56.5-23.5T120 240q0-33 23.5-56.5T200 160q33 0 56.5 23.5T280 240q0 33-23.5 56.5T200 320Z"/></symbol>
    <symbol id="ms-map" viewBox="0 0 960 960"><path d="m600 840-240-84-186 72q-20 8-37-4.5T120 790V230q0-13 7.5-23t20.5-15l212-72 240 84 186-72q20-8 37 4.5t17 33.5v560q0 13-7.5 23T812 768l-212 72Zm-40-98V274l-160-56v468l160 56Zm80 0 120-40V228l-120 46v468Zm-440-10 120-46V218l-120 40v474Z"/></symbol>
    <symbol id="ms-more-horiz" viewBox="0 0 960 960"><path d="M240 560q-33 0-56.5-23.5T160 480q0-33 23.5-56.5T240 400q33 0 56.5 23.5T320 480q0 33-23.5 56.5T240 560Zm240 0q-33 0-56.5-23.5T400 480q0-33 23.5-56.5T480 400q33 0 56.5 23.5T560 480q0 33-23.5 56.5T480 560Zm240 0q-33 0-56.5-23.5T640 480q0-33 23.5-56.5T720 400q33 0 56.5 23.5T800 480q0 33-23.5 56.5T720 560Z"/></symbol>
    <symbol id="ms-my-location" viewBox="0 0 960 960"><path d="M440 918v-80q-125-14-214.5-103.5T122 520H42v-80h80q14-125 103.5-214.5T440 122V42h80v80q125 14 214.5 103.5T838 440h80v80h-80q-14 125-103.5 214.5T520 838v80h-80Zm40-158q116 0 198-82t82-198q0-116-82-198t-198-82q-116 0-198 82t-82 198q0 116 82 198t198 82Zm0-120q-66 0-113-47t-47-113q0-66 47-113t113-47q66 0 113 47t47 113q0 66-47 113t-113 47Zm0-80q33 0 56.5-23.5T560 480q0-33-23.5-56.5T480 400q-33 0-56.5 23.5T400 480q0 33 23.5 56.5T480 560Z"/></symbol>
    <symbol id="ms-refresh" viewBox="0 0 960 960"><path d="M480 800q-134 0-227-93t-93-227q0-134 93-227t227-93q69 0 132 28.5T720 270V160h80v280H520v-80h168q-32-56-87.5-88T480 240q-100 0-170 70t-70 170q0 100 70 170t170 70q77 0 139-44t87-116h84q-28 106-114 173t-196 67Z"/></symbol>
    <symbol id="ms-search" viewBox="0 0 960 960"><path d="M784 840 532 588q-30 24-69 38t-83 14q-109 0-184.5-75.5T120 380q0-109 75.5-184.5T380 120q109 0 184.5 75.5T640 380q0 44-14 83t-38 69l252 252-56 56ZM380 560q75 0 127.5-52.5T560 380q0-75-52.5-127.5T380 200q-75 0-127.5 52.5T200 380q0 75 52.5 127.5T380 560Z"/></symbol>
  </svg>
  <div id="app">
    <header class="topbar" id="topbar">
      <div class="brand-row">
        <div class="brand-copy">
          <img class="brand-mark" src="icons/mark-cafe-shops.svg" width="76" height="20" alt="Cafe Shops" />
          <button id="cityButton" class="city-title-button" type="button" aria-haspopup="dialog" aria-controls="citySheet">
            <span data-city-label>Hong Kong</span>
            <span class="city-chevron" aria-hidden="true"><svg class="material-symbol" viewBox="0 0 960 960"><use href="#ms-expand-more"/></svg></span>
          </button>
          <script>
            (() => {
              try {
                const city = localStorage.getItem('coffee-map-active-city-v1');
                if (!['Hong Kong', 'Tokyo', 'Beijing'].includes(city)) return;
                document.querySelector('[data-city-label]').textContent = city;
                document.documentElement.dataset.city = city.toLowerCase().replace(/\s+/g, '-');
                document.title = city + ' · Coffee Shops';
              } catch (_) {}
            })();
          </script>
        </div>
        <div class="brand-actions">
          <span id="syncIndicator" class="sync-indicator syncing">正在同步</span>
          <button id="menuButton" class="icon-button" aria-label="数据与设置">
            <svg class="material-symbol" viewBox="0 0 960 960" aria-hidden="true"><use href="#ms-more-horiz"/></svg>
          </button>
        </div>
      </div>
      <div class="search-wrap">
        <svg class="material-symbol" viewBox="0 0 960 960" aria-hidden="true"><use href="#ms-search"/></svg>
        <input id="searchInput" type="search" placeholder="搜索店名、地址或地区" autocomplete="off" />
        <button id="clearSearch" class="clear-search" aria-label="清除搜索"><svg class="material-symbol" viewBox="0 0 960 960" aria-hidden="true"><use href="#ms-close"/></svg></button>
      </div>
      <div class="filter-row" id="regionFilters" aria-label="地区筛选">
        <button class="chip active" data-region="全部">全部 <span id="allCount">—</span></button>
        <button class="chip" data-region="港岛">港岛</button>
        <button class="chip" data-region="九龙">九龙</button>
        <button class="chip" data-region="新界">新界</button>
        <button class="chip" data-region="离岛">离岛</button>
        <button class="chip district-chip" id="districtButton">具体地区 <svg class="material-symbol" viewBox="0 0 960 960" aria-hidden="true"><use href="#ms-expand-more"/></svg></button>
      </div>
    </header>

    <main class="workspace">
      <section id="map" aria-label="咖啡店地图"></section>
      <aside id="listPanel" class="list-panel">
        <div class="list-handle"></div>
        <div class="list-head">
          <div><p class="list-kicker">当前结果</p><h2><span id="resultCount">—</span> 家咖啡店</h2></div>
          <button id="fitButton" class="text-button">显示全部</button>
        </div>
        <div id="shopList" class="shop-list"><div class="empty-state">正在从云端加载…</div></div>
      </aside>
      <button id="locateButton" class="map-fab locate-fab" aria-label="定位到当前位置">
        <svg class="material-symbol" viewBox="0 0 960 960" aria-hidden="true"><use href="#ms-my-location"/></svg>
      </button>
      <button id="addButton" class="map-fab add-fab" aria-label="添加咖啡店"><svg class="material-symbol" viewBox="0 0 960 960" aria-hidden="true"><use href="#ms-add"/></svg></button>
    </main>

    <nav class="bottom-nav" aria-label="视图切换">
      <button class="nav-item active" data-view="map"><svg class="material-symbol" viewBox="0 0 960 960" aria-hidden="true"><use href="#ms-map"/></svg><span>地图</span></button>
      <button class="nav-item" data-view="list"><svg class="material-symbol" viewBox="0 0 960 960" aria-hidden="true"><use href="#ms-format-list-bulleted"/></svg><span>列表</span></button>
      <button class="nav-item" data-view="saved"><svg class="material-symbol" viewBox="0 0 960 960" aria-hidden="true"><use href="#ms-bookmark"/></svg><span>收藏</span></button>
    </nav>
  </div>

  <div id="detailSheet" class="sheet detail-sheet" aria-hidden="true">
    <div class="sheet-backdrop" data-close-sheet></div>
    <article class="sheet-card">
      <div class="sheet-grabber"></div>
      <button class="sheet-close" data-close-sheet aria-label="关闭"><svg class="material-symbol" viewBox="0 0 960 960" aria-hidden="true"><use href="#ms-close"/></svg></button>
      <div class="detail-meta"><span id="detailRegion"></span><span id="detailDistrict"></span></div>
      <h2 id="detailName"></h2>
      <p id="detailAddress" class="detail-address"></p>
      <div id="detailNotes" class="detail-notes"></div>
      <div class="detail-actions">
        <a id="googleMapsButton" class="primary-action large-action map-link-action" target="_blank" rel="noopener">
          <svg class="map-service-icon" viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M18.27 6c1.01 2.17.78 4.73-.33 6.81c-.94 1.69-2.29 3.12-3.44 4.69c-.5.7-1 1.45-1.37 2.26c-.13.27-.22.55-.32.83s-.19.56-.28.84c-.09.26-.2.57-.53.57c-.39 0-.5-.44-.58-.74c-.24-.73-.48-1.43-.85-2.1c-.42-.79-.95-1.52-1.49-2.23zM9.12 8.42l-3.3 3.92c.61 1.29 1.52 2.39 2.39 3.49c.21.25.42.51.62.78L13 11.67l-.04.01c-1.46.5-3.08-.24-3.66-1.68c-.08-.17-.14-.37-.18-.57a3 3 0 0 1 0-1zm-2.54-3.8l-.01.01c-1.62 2.05-1.9 4.9-.93 7.31L9.63 7.2l-.05-.05zm7.64-2.26L11 6.17l.04-.01c1.34-.46 2.84.12 3.52 1.34c.15.28.27.58.31.88c.06.38.08.65.01 1.02v.01l3.2-3.8a7 7 0 0 0-3.85-3.24zM9.89 6.89l3.91-4.65l-.04-.01C13.18 2.08 12.59 2 12 2c-1.97 0-3.83.85-5.15 2.31l-.02.01z"/></svg>
          <span>Google Maps</span>
        </a>
        <a id="appleMapsButton" class="primary-action large-action map-link-action" target="_blank" rel="noopener" hidden aria-hidden="true">
          <svg class="map-service-icon" viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47c-1.34.03-1.77-.79-3.29-.79c-1.53 0-2 .77-3.27.82c-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51c1.28-.02 2.5.87 3.29.87c.78 0 2.26-1.07 3.81-.91c.65.03 2.47.26 3.64 1.98c-.09.06-2.17 1.28-2.15 3.81c.03 3.02 2.65 4.03 2.68 4.04c-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5c.13 1.17-.34 2.35-1.04 3.19c-.69.85-1.83 1.51-2.95 1.42c-.15-1.15.41-2.35 1.05-3.11"/></svg>
          <span>Apple Maps</span>
        </a>
        <button id="favoriteButton" class="secondary-action favorite-action" type="button" aria-pressed="false">
          <svg class="material-symbol" viewBox="0 0 960 960" aria-hidden="true"><use href="#ms-bookmark"/></svg>
          <span id="favoriteButtonLabel">收藏</span>
        </button>
      </div>
    </article>
  </div>

  <div id="districtSheet" class="sheet" aria-hidden="true">
    <div class="sheet-backdrop" data-close-district></div>
    <article class="sheet-card compact-card">
      <div class="sheet-grabber"></div>
      <div class="sheet-title-row"><h2>选择具体地区</h2><button class="sheet-close" data-close-district aria-label="关闭"><svg class="material-symbol" viewBox="0 0 960 960" aria-hidden="true"><use href="#ms-close"/></svg></button></div>
      <div id="districtList" class="district-grid"></div>
    </article>
  </div>

  <div id="menuSheet" class="sheet" aria-hidden="true">
    <div class="sheet-backdrop" data-close-menu></div>
    <article class="sheet-card compact-card">
      <div class="sheet-grabber"></div>
      <div class="sheet-title-row"><div><p class="list-kicker">Cloud Data</p><h2>数据与设置</h2></div><button class="sheet-close" data-close-menu aria-label="关闭"><svg class="material-symbol" viewBox="0 0 960 960" aria-hidden="true"><use href="#ms-close"/></svg></button></div>
      <div class="cloud-summary"><span id="cloudDot" class="cloud-dot syncing"></span><div><strong id="cloudState">正在同步</strong><p id="cloudMeta">连接 Google Sheets 云端数据库</p></div></div>
      <div class="admin-card">
        <label for="adminKeyInput">管理员密钥</label>
        <div class="admin-key-row"><input id="adminKeyInput" type="password" autocomplete="off" placeholder="未设置" /><button id="saveAdminKeyButton" type="button">保存</button></div>
        <button id="clearAdminKeyButton" class="inline-danger" type="button">清除本机密钥</button>
        <p>密钥仅保存在这台设备。设置后可新增、编辑、删除地点和同步收藏。</p>
      </div>
      <div class="menu-list">
        <button id="refreshButton" class="menu-row"><span>重新同步云端数据</span><svg class="material-symbol" viewBox="0 0 960 960" aria-hidden="true"><use href="#ms-refresh"/></svg></button>
        <button id="exportJsonButton" class="menu-row"><span>导出 JSON 备份</span><svg class="material-symbol" viewBox="0 0 960 960" aria-hidden="true"><use href="#ms-arrow-forward"/></svg></button>
        <button id="exportCsvButton" class="menu-row"><span>导出 CSV</span><svg class="material-symbol" viewBox="0 0 960 960" aria-hidden="true"><use href="#ms-arrow-forward"/></svg></button>
      </div>
      <p class="menu-note">店铺数据以 Google Sheet 为唯一数据源；网页和浏览器不会保存店铺副本。</p>
    </article>
  </div>

  <dialog id="addDialog" class="add-dialog">
    <form id="addForm" method="dialog">
      <div class="dialog-head"><div><p id="dialogKicker" class="list-kicker">New Place</p><h2 id="dialogTitle">添加咖啡店</h2></div><button type="button" id="closeAddDialog" class="sheet-close" aria-label="关闭"><svg class="material-symbol" viewBox="0 0 960 960" aria-hidden="true"><use href="#ms-close"/></svg></button></div>
      <div class="form-grid">
        <div class="full map-parse-group">
          <div class="map-parse-row">
            <label class="primary-input map-provider-field" data-map-provider-field="google"><span>Google Maps 链接 *</span><input name="google_maps" type="url" required placeholder="https://maps.app.goo.gl/…" /></label>
            <label class="primary-input map-provider-field" data-map-provider-field="apple" hidden><span>Apple Maps 链接 *</span><input name="apple_maps" type="url" placeholder="https://maps.apple.com/place?…" disabled /></label>
            <button type="button" id="parsePlaceButton" class="parse-button">解析地点</button>
          </div>
          <span id="parseState" class="parse-state">粘贴具体商户链接后解析</span>
        </div>
        <label><span>店铺名称 *</span><input name="name" required /></label>
        <label><span>具体地区 *</span><input name="district" required placeholder="例如：上环" /></label>
        <label><span>大区 *</span><input name="region" required placeholder="港岛 / 九龙 / 新界 / 离岛" /></label>
        <label class="full"><span>地址 *</span><input name="address" required /></label>
        <label><span>纬度 *</span><input name="latitude" type="number" step="any" required /></label>
        <label><span>经度 *</span><input name="longitude" type="number" step="any" required /></label>
        <label><span>类型</span><input name="category" placeholder="例如：手冲、烘焙" /></label>
        <label><span>来源链接</span><input name="source" type="url" placeholder="Instagram / 小红书等" /></label>
        <label class="full"><span>备注</span><textarea name="notes" rows="3" placeholder="推荐饮品、营业提醒……"></textarea></label>
      </div>
      <div class="dialog-actions">
        <button type="button" id="useMapCenter" class="center-button">使用当前位置坐标</button>
        <button type="submit" id="savePlaceButton" class="primary-action dialog-submit">保存到云端</button>
      </div>
    </form>
  </dialog>

  <div id="toast" class="toast" role="status"></div>
  <script src="https://unpkg.com/maplibre-gl@5.12.0/dist/maplibre-gl.js"></script>
  <script src="./map-config.js?v=17"></script>
  <script src="./app.js?v=30"></script>
  <script src="./admin-core.js?v=17"></script>
</body>
</html>
