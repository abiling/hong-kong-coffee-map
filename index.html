<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no" />
  <meta name="theme-color" content="#f4f1ea" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Hong Kong" />
  <title>Hong Kong · Coffee Shops</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icons/icon-192.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="icons/icon-180.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Schibsted+Grotesk:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="preconnect" href="https://tiles.openfreemap.org" />
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@5.12.0/dist/maplibre-gl.css" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="admin.css" />
</head>
<body>
  <div id="app">
    <header class="topbar" id="topbar">
      <div class="brand-row">
        <div>
          <div class="eyebrow-row">
            <p class="eyebrow">Coffee Shops</p>
            <span id="syncIndicator" class="sync-indicator syncing">正在同步</span>
          </div>
          <h1>Hong Kong</h1>
        </div>
        <button id="menuButton" class="icon-button" aria-label="数据与设置">
          <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="5" cy="12" r="1.6"/><circle cx="12" cy="12" r="1.6"/><circle cx="19" cy="12" r="1.6"/></svg>
        </button>
      </div>
      <div class="search-wrap">
        <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="6.7"/><path d="m16 16 4 4"/></svg>
        <input id="searchInput" type="search" placeholder="搜索店名、地址或地区" autocomplete="off" />
        <button id="clearSearch" class="clear-search" aria-label="清除搜索">×</button>
      </div>
      <div class="filter-row" id="regionFilters" aria-label="地区筛选">
        <button class="chip active" data-region="全部">全部 <span id="allCount">—</span></button>
        <button class="chip" data-region="港岛">港岛</button>
        <button class="chip" data-region="九龙">九龙</button>
        <button class="chip" data-region="新界">新界</button>
        <button class="chip" data-region="离岛">离岛</button>
        <button class="chip district-chip" id="districtButton">具体地区 <span>⌄</span></button>
      </div>
    </header>

    <main class="workspace">
      <section id="map" aria-label="咖啡店地图"></section>
      <aside id="listPanel" class="list-panel">
        <div class="list-handle"></div>
        <div class="list-head">
          <div><p class="list-kicker">当前结果</p><h2><span id="resultCount">—</span> 家咖啡店</h2></div>
          <button id="fitButton" class="text-button">显示全部</button>
        </div>
        <div id="shopList" class="shop-list"><div class="empty-state">正在从云端加载…</div></div>
      </aside>
      <button id="locateButton" class="map-fab locate-fab" aria-label="定位到当前位置">
        <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="3"/><circle cx="12" cy="12" r="8"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2"/></svg>
      </button>
      <button id="addButton" class="map-fab add-fab" aria-label="添加咖啡店">+</button>
    </main>

    <nav class="bottom-nav" aria-label="视图切换">
      <button class="nav-item active" data-view="map"><svg viewBox="0 0 24 24"><path d="m3 6 5-2 8 3 5-2v13l-5 2-8-3-5 2Z"/><path d="M8 4v13M16 7v13"/></svg><span>地图</span></button>
      <button class="nav-item" data-view="list"><svg viewBox="0 0 24 24"><path d="M8 6h12M8 12h12M8 18h12"/><circle cx="4" cy="6" r="1"/><circle cx="4" cy="12" r="1"/><circle cx="4" cy="18" r="1"/></svg><span>列表</span></button>
    </nav>
  </div>

  <div id="detailSheet" class="sheet detail-sheet" aria-hidden="true">
    <div class="sheet-backdrop" data-close-sheet></div>
    <article class="sheet-card">
      <div class="sheet-grabber"></div>
      <button class="sheet-close" data-close-sheet aria-label="关闭">×</button>
      <div class="detail-meta"><span id="detailRegion"></span><span id="detailDistrict"></span></div>
      <h2 id="detailName"></h2>
      <p id="detailAddress" class="detail-address"></p>
      <div id="detailNotes" class="detail-notes"></div>
      <div class="detail-actions">
        <a id="googleMapsButton" class="primary-action map-link-action" target="_blank" rel="noopener">
          <svg class="map-service-icon" viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M18.27 6c1.01 2.17.78 4.73-.33 6.81c-.94 1.69-2.29 3.12-3.44 4.69c-.5.7-1 1.45-1.37 2.26c-.13.27-.22.55-.32.83s-.19.56-.28.84c-.09.26-.2.57-.53.57c-.39 0-.5-.44-.58-.74c-.24-.73-.48-1.43-.85-2.1c-.42-.79-.95-1.52-1.49-2.23zM9.12 8.42l-3.3 3.92c.61 1.29 1.52 2.39 2.39 3.49c.21.25.42.51.62.78L13 11.67l-.04.01c-1.46.5-3.08-.24-3.66-1.68c-.08-.17-.14-.37-.18-.57a3 3 0 0 1 0-1zm-2.54-3.8l-.01.01c-1.62 2.05-1.9 4.9-.93 7.31L9.63 7.2l-.05-.05zm7.64-2.26L11 6.17l.04-.01c1.34-.46 2.84.12 3.52 1.34c.15.28.27.58.31.88c.06.38.08.65.01 1.02v.01l3.2-3.8a7 7 0 0 0-3.85-3.24zM9.89 6.89l3.91-4.65l-.04-.01C13.18 2.08 12.59 2 12 2c-1.97 0-3.83.85-5.15 2.31l-.02.01z"/></svg>
          <span>Google Maps</span>
        </a>
        <a id="appleMapsButton" class="primary-action map-link-action" target="_blank" rel="noopener" hidden aria-hidden="true">
          <svg class="map-service-icon" viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47c-1.34.03-1.77-.79-3.29-.79c-1.53 0-2 .77-3.27.82c-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51c1.28-.02 2.5.87 3.29.87c.78 0 2.26-1.07 3.81-.91c.65.03 2.47.26 3.64 1.98c-.09.06-2.17 1.28-2.15 3.81c.03 3.02 2.65 4.03 2.68 4.04c-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5c.13 1.17-.34 2.35-1.04 3.19c-.69.85-1.83 1.51-2.95 1.42c-.15-1.15.41-2.35 1.05-3.11"/></svg>
          <span>Apple Maps</span>
        </a>
      </div>
    </article>
  </div>

  <div id="districtSheet" class="sheet" aria-hidden="true">
    <div class="sheet-backdrop" data-close-district></div>
    <article class="sheet-card compact-card">
      <div class="sheet-grabber"></div>
      <div class="sheet-title-row"><h2>选择具体地区</h2><button class="sheet-close" data-close-district>×</button></div>
      <div id="districtList" class="district-grid"></div>
    </article>
  </div>

  <div id="menuSheet" class="sheet" aria-hidden="true">
    <div class="sheet-backdrop" data-close-menu></div>
    <article class="sheet-card compact-card">
      <div class="sheet-grabber"></div>
      <div class="sheet-title-row"><div><p class="list-kicker">Cloud Data</p><h2>数据与设置</h2></div><button class="sheet-close" data-close-menu>×</button></div>
      <div class="cloud-summary"><span id="cloudDot" class="cloud-dot syncing"></span><div><strong id="cloudState">正在同步</strong><p id="cloudMeta">连接 Google Sheets 云端数据库</p></div></div>
      <div class="admin-card">
        <label for="adminKeyInput">管理员密钥</label>
        <div class="admin-key-row"><input id="adminKeyInput" type="password" autocomplete="off" placeholder="未设置" /><button id="saveAdminKeyButton" type="button">保存</button></div>
        <button id="clearAdminKeyButton" class="inline-danger" type="button">清除本机密钥</button>
        <p>密钥仅保存在这台设备。设置后可新增、编辑和删除地点。</p>
      </div>
      <div class="menu-list">
        <button id="refreshButton" class="menu-row"><span>重新同步云端数据</span><b>↻</b></button>
        <button id="exportJsonButton" class="menu-row"><span>导出 JSON 备份</span><b>→</b></button>
        <button id="exportCsvButton" class="menu-row"><span>导出 CSV</span><b>→</b></button>
      </div>
      <p class="menu-note">店铺数据以 Google Sheet 为唯一数据源；网页和浏览器不会保存店铺副本。</p>
    </article>
  </div>

  <dialog id="addDialog" class="add-dialog">
    <form id="addForm" method="dialog">
      <div class="dialog-head"><div><p id="dialogKicker" class="list-kicker">New Place</p><h2 id="dialogTitle">添加咖啡店</h2></div><button type="button" id="closeAddDialog" class="sheet-close">×</button></div>
      <div class="form-grid">
        <label class="full primary-input map-provider-field" data-map-provider-field="google"><span>Google Maps 链接 *</span><input name="google_maps" type="url" required placeholder="https://maps.app.goo.gl/…" /></label>
        <label class="full primary-input map-provider-field" data-map-provider-field="apple" hidden><span>Apple Maps 链接 *</span><input name="apple_maps" type="url" placeholder="https://maps.apple.com/place?…" disabled /></label>
        <div class="full parse-row"><button type="button" id="parsePlaceButton" class="parse-button">解析地点</button><span id="parseState">粘贴具体商户链接后解析</span></div>
        <label><span>店铺名称 *</span><input name="name" required /></label>
        <label><span>具体地区 *</span><input name="district" required placeholder="例如：上环" /></label>
        <label><span>大区 *</span><input name="region" required placeholder="港岛 / 九龙 / 新界 / 离岛" /></label>
        <label class="full"><span>地址 *</span><input name="address" required /></label>
        <label><span>纬度 *</span><input name="latitude" type="number" step="any" required /></label>
        <label><span>经度 *</span><input name="longitude" type="number" step="any" required /></label>
        <label><span>类型</span><input name="category" placeholder="例如：手冲、烘焙" /></label>
        <label><span>来源链接</span><input name="source" type="url" placeholder="Instagram / 小红书等" /></label>
        <label class="full"><span>备注</span><textarea name="notes" rows="3" placeholder="推荐饮品、营业提醒……"></textarea></label>
      </div>
      <button type="button" id="useMapCenter" class="center-button">使用当前地图中心坐标</button>
      <button type="submit" id="savePlaceButton" class="primary-action dialog-submit">保存到云端地图</button>
    </form>
  </dialog>

  <div id="toast" class="toast" role="status"></div>
  <script src="https://unpkg.com/maplibre-gl@5.12.0/dist/maplibre-gl.js"></script>
  <script src="map-config.js"></script>
  <script src="app.js"></script>
  <script src="admin-core.js"></script>
</body>
</html>
